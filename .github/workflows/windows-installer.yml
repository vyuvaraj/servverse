name: Compile & Release Windows Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-installer:
    # Do not run concurrently; wait until main release build finishes compiling the actual binaries
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Build Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch tag version
          $tag = "${{ github.ref_name }}"
          
          # Fetch the official zip containing compiled production binaries
          gh release download $tag -p "servverse-${tag}-windows-amd64.zip" --dir dist
          
          # Extract production binaries into target parent directories to feed ISS source directories
          Expand-Archive -Path "dist/servverse-${tag}-windows-amd64.zip" -DestinationPath "dist/extracted" -Force
          $binaries = Get-ChildItem "dist/extracted/servverse-${tag}-windows-amd64/*"
          foreach ($file in $binaries) {
            $dest = Join-Path ".." $file.Name
            Copy-Item -Path $file.FullName -Destination $dest -Force
          }

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer Package
        run: |
          iscc servverse.iss

      - name: Upload Installer to Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/ServVerse-windows-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
