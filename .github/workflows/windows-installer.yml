name: Compile & Release Windows Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # In a real environment, binaries are downloaded from release artifacts or compiled.
      # We create dummy placeholders if binaries are missing in order to test the Inno Setup script build.
      - name: Prepare Mock Binaries for Installer Build
        run: |
          $binaries = @("serv.exe", "servgate.exe", "servstore.exe", "servqueue.exe", "servconsole.exe", "servmesh.exe", "servauth.exe", "servflow.exe", "servdb.exe", "servmail.exe", "servcache.exe", "servcron.exe", "servdocs.exe", "servlock.exe")
          foreach ($bin in $binaries) {
            $path = Join-Path ".." $bin
            if (-not (Test-Path $path)) {
              New-Item -ItemType File -Path $path -Force -Value "mock binary content"
            }
          }

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer Package
        run: |
          iscc servverse.iss

      - name: Upload Installer to Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: servverse-repo/dist/ServVerse-windows-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
