name: macOS Package Build and Notarization

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Installer Package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/build-macos-pkg.sh
          ./scripts/build-macos-pkg.sh

      # Simulated notarization step for Apple Developer pipeline submission
      - name: Notarize Package (Simulated)
        run: |
          echo "Submitting to Apple Developer Notarization Service..."
          echo "xcrun notarytool submit dist/ServVerse-macos-setup.pkg --apple-id '${{ secrets.APPLE_ID }}' --password '${{ secrets.APPLE_NOTARY_PASSWORD }}' --team-id '${{ secrets.APPLE_TEAM_ID }}' --wait"
          echo "Notarization successful!"

      - name: Upload macOS Package to Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/ServVerse-macos-setup.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
