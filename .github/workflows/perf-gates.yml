name: Performance Regression & SLA Gates

on:
  pull_request:
    branches: [ main ]

jobs:
  performance-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Compare Micro-Benchmarks
        run: |
          export GOWORK=off
          python scripts/perf_run.py compare

      - name: Validate Performance SLA Limits
        run: python scripts/verify_perf_sla.py
