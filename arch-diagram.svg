<svg viewBox="0 0 1060 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background for light-mode visibility -->
  <rect width="1060" height="720" rx="16" fill="#0f1119"/>
  <defs>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="grad-gate" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="hsl(190,100%,65%)"/><stop offset="100%" stop-color="hsl(210,100%,55%)"/></linearGradient>
    <linearGradient id="grad-lang" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="hsl(250,100%,75%)"/><stop offset="100%" stop-color="hsl(280,100%,65%)"/></linearGradient>
    <linearGradient id="grad-store" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="hsl(145,90%,60%)"/><stop offset="100%" stop-color="hsl(170,90%,50%)"/></linearGradient>
    <linearGradient id="grad-queue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="hsl(40,95%,60%)"/><stop offset="100%" stop-color="hsl(20,95%,50%)"/></linearGradient>
    <marker id="arr-b" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0 1.5L8 5 0 8.5z" fill="hsl(190,100%,65%)"/></marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0 1.5L8 5 0 8.5z" fill="hsl(145,90%,60%)"/></marker>
    <marker id="arr-o" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0 1.5L8 5 0 8.5z" fill="hsl(40,95%,60%)"/></marker>
  </defs>

  <!-- Layer Labels -->
  <text x="18" y="62" fill="hsl(250,100%,75%)" font-size="10" font-family="sans-serif" font-weight="700" opacity="0.7">DEVELOPER</text>
  <text x="18" y="172" fill="hsl(190,100%,65%)" font-size="10" font-family="sans-serif" font-weight="700" opacity="0.7">PLATFORM</text>
  <text x="18" y="322" fill="hsl(145,90%,60%)" font-size="10" font-family="sans-serif" font-weight="700" opacity="0.7">INFRASTRUCTURE</text>
  <text x="18" y="612" fill="hsl(40,95%,60%)" font-size="10" font-family="sans-serif" font-weight="700" opacity="0.7">OBSERVABILITY</text>

  <!-- Layer separators -->
  <line x1="80" y1="105" x2="1040" y2="105" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="260" x2="1040" y2="260" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="570" x2="1040" y2="570" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- ═══════════════════ DEVELOPER LAYER ═══════════════════ -->
  <rect x="100" y="30" width="155" height="60" rx="12" fill="rgba(168,85,247,0.06)" stroke="url(#grad-lang)" stroke-width="1.5" filter="url(#glow-purple)"/>
  <text x="177" y="55" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">Serv-lang</text>
  <text x="177" y="72" fill="hsl(250,100%,75%)" font-size="9" font-family="monospace" text-anchor="middle">Compiler + LSP + CLI</text>

  <rect x="285" y="30" width="140" height="60" rx="12" fill="rgba(168,85,247,0.03)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="355" y="55" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServRegistry</text>
  <text x="355" y="72" fill="hsl(250,100%,75%)" font-size="9" font-family="monospace" text-anchor="middle">:8088 · Packages</text>

  <rect x="455" y="30" width="120" height="60" rx="12" fill="rgba(168,85,247,0.03)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="515" y="55" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServDocs</text>
  <text x="515" y="72" fill="hsl(250,100%,75%)" font-size="9" font-family="monospace" text-anchor="middle">:8089 · API Docs</text>

  <!-- ═══════════════════ PLATFORM LAYER ═══════════════════ -->
  <!-- Client -->
  <rect x="100" y="130" width="85" height="70" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="142" y="162" fill="#fff" font-size="11" font-family="sans-serif" font-weight="700" text-anchor="middle">Client</text>
  <text x="142" y="178" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Browser / SDK</text>

  <!-- ServGate -->
  <rect x="230" y="120" width="155" height="90" rx="14" fill="rgba(6,182,212,0.05)" stroke="url(#grad-gate)" stroke-width="2" filter="url(#glow-blue)"/>
  <text x="307" y="147" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">ServGate</text>
  <text x="307" y="163" fill="hsl(190,100%,65%)" font-size="9" font-family="monospace" text-anchor="middle">:8080 · API Gateway</text>
  <text x="307" y="183" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">WASM · AI Guard · MCP</text>
  <text x="307" y="197" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Rate Limit · GraphQL</text>

  <!-- ServMesh -->
  <rect x="420" y="130" width="135" height="70" rx="12" fill="rgba(6,182,212,0.03)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="487" y="157" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServMesh</text>
  <text x="487" y="173" fill="hsl(190,100%,65%)" font-size="9" font-family="monospace" text-anchor="middle">:8087 · Service Mesh</text>
  <text x="487" y="190" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Discovery · Circuit Breaker</text>

  <!-- ServTunnel -->
  <rect x="590" y="130" width="125" height="70" rx="12" fill="rgba(6,182,212,0.03)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="652" y="157" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServTunnel</text>
  <text x="652" y="173" fill="hsl(190,100%,65%)" font-size="9" font-family="monospace" text-anchor="middle">:8443 · Dev Tunnel</text>
  <text x="652" y="190" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">WebSocket · Subdomain</text>

  <!-- ServCloud -->
  <rect x="750" y="130" width="125" height="70" rx="12" fill="rgba(6,182,212,0.03)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="812" y="157" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServCloud</text>
  <text x="812" y="173" fill="hsl(190,100%,65%)" font-size="9" font-family="monospace" text-anchor="middle">:8086 · PaaS Deploy</text>
  <text x="812" y="190" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Docker · Route Sync</text>

