  <!-- Row 1: Core Storage & Messaging -->
  <rect x="100" y="285" width="170" height="95" rx="14" fill="rgba(16,185,129,0.05)" stroke="url(#grad-store)" stroke-width="1.5" filter="url(#glow-green)"/>
  <text x="185" y="312" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">ServStore</text>
  <text x="185" y="328" fill="hsl(145,90%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8081 · S3 Storage</text>
  <text x="185" y="348" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Raft · Erasure Coding</text>
  <text x="185" y="363" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Semantic Search · WASM</text>

  <rect x="295" y="285" width="170" height="95" rx="14" fill="rgba(245,158,11,0.05)" stroke="url(#grad-queue)" stroke-width="1.5" filter="url(#glow-orange)"/>
  <text x="380" y="312" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">ServQueue</text>
  <text x="380" y="328" fill="hsl(40,95%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8082 · STOMP Broker</text>
  <text x="380" y="348" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">WASM Transforms · DLQ</text>
  <text x="380" y="363" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Consumer Groups · Raft</text>

  <rect x="490" y="285" width="135" height="95" rx="12" fill="rgba(16,185,129,0.03)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="557" y="312" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServCache</text>
  <text x="557" y="328" fill="hsl(145,90%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8084 · Cache</text>
  <text x="557" y="348" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Redis / In-Memory</text>
  <text x="557" y="363" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">TTL Eviction · OTel</text>

  <rect x="650" y="285" width="135" height="95" rx="12" fill="rgba(245,158,11,0.03)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="717" y="312" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServCron</text>
  <text x="717" y="328" fill="hsl(40,95%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8085 · Scheduler</text>
  <text x="717" y="348" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Redis Leader Election</text>
  <text x="717" y="363" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Cron + Interval Jobs</text>

  <!-- Row 2: Application Services -->
  <rect x="100" y="405" width="135" height="85" rx="12" fill="rgba(16,185,129,0.03)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="167" y="430" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServAuth</text>
  <text x="167" y="446" fill="hsl(145,90%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8098 · Identity</text>
  <text x="167" y="465" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">OAuth2 · MFA · RBAC</text>
  <text x="167" y="479" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">JWT · Social Login</text>

  <rect x="260" y="405" width="135" height="85" rx="12" fill="rgba(16,185,129,0.03)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="327" y="430" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServDB</text>
  <text x="327" y="446" fill="hsl(145,90%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8097 · DB Proxy</text>
  <text x="327" y="465" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Pooling · Read/Write</text>
  <text x="327" y="479" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Multi-Dialect · Cache</text>

  <rect x="420" y="405" width="135" height="85" rx="12" fill="rgba(245,158,11,0.03)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="487" y="430" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServMail</text>
  <text x="487" y="446" fill="hsl(40,95%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8094 · Notifications</text>
  <text x="487" y="465" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">SMTP · Slack · SMS</text>
  <text x="487" y="479" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Templates · DLQ Retry</text>

  <rect x="580" y="405" width="135" height="85" rx="12" fill="rgba(245,158,11,0.03)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="647" y="430" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServFlow</text>
  <text x="647" y="446" fill="hsl(40,95%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8096 · Workflows</text>
  <text x="647" y="465" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">DAG · Sagas · Approval</text>
  <text x="647" y="479" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Durable Checkpoints</text>

  <!-- ═══════════════════ OBSERVABILITY LAYER ═══════════════════ -->
  <rect x="200" y="595" width="200" height="80" rx="14" fill="rgba(245,158,11,0.05)" stroke="rgba(245,158,11,0.4)" stroke-width="1.5" filter="url(#glow-orange)"/>
  <text x="300" y="622" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">ServConsole</text>
  <text x="300" y="638" fill="hsl(40,95%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8083 · Unified Dashboard</text>
  <text x="300" y="658" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">AI Observatory · SQL · Alerts · SLO</text>

  <rect x="440" y="595" width="160" height="80" rx="12" fill="rgba(245,158,11,0.03)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="520" y="622" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServTrace</text>
  <text x="520" y="638" fill="hsl(40,95%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8090 · Tracing</text>
  <text x="520" y="658" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">OTLP Ingestion · Waterfall</text>

  <rect x="640" y="595" width="145" height="80" rx="12" fill="rgba(16,185,129,0.03)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="712" y="622" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">ServShared</text>
  <text x="712" y="638" fill="hsl(145,90%,60%)" font-size="9" font-family="monospace" text-anchor="middle">Go Library</text>
  <text x="712" y="658" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif" text-anchor="middle">Health · OTel · JWT · Log</text>

  <!-- ═══════════════════ DATA FLOW CONNECTIONS ═══════════════════ -->
  <!-- Client → Gate -->
  <path d="M185 165L230 165" stroke="hsl(190,100%,65%)" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="208" y="158" fill="hsl(190,100%,65%)" font-size="7" font-family="sans-serif" font-weight="600" text-anchor="middle">HTTPS</text>

  <!-- Gate → Mesh -->
  <path d="M385 165L420 165" stroke="hsl(190,100%,65%)" stroke-width="1.5" marker-end="url(#arr-b)" stroke-dasharray="4,3"/>

  <!-- Gate → Store (config) -->
  <path d="M280 210L185 285" stroke="hsl(145,90%,60%)" stroke-width="1.2" marker-end="url(#arr-g)" stroke-dasharray="4,3"/>

  <!-- Gate → Queue (events) -->
  <path d="M340 210L380 285" stroke="hsl(40,95%,60%)" stroke-width="1.2" marker-end="url(#arr-o)" stroke-dasharray="4,3"/>

  <!-- Mesh → Services (routing) -->
  <path d="M487 200L557 285" stroke="hsl(145,90%,60%)" stroke-width="1" marker-end="url(#arr-g)" stroke-dasharray="3,3"/>
  <path d="M500 200L717 285" stroke="hsl(40,95%,60%)" stroke-width="1" marker-end="url(#arr-o)" stroke-dasharray="3,3"/>

  <!-- Cloud → Gate (route sync) -->
  <path d="M750 165L385 155" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="565" y="148" fill="rgba(255,255,255,0.4)" font-size="7" font-family="sans-serif" text-anchor="middle">Route Sync</text>

  <!-- Auth → Store (persistence) -->
  <path d="M167 405L185 380" stroke="hsl(145,90%,60%)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Mail → Queue (DLQ) -->
  <path d="M487 405L400 380" stroke="hsl(40,95%,60%)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Flow → Queue (events) -->
  <path d="M630 405L400 365" stroke="hsl(40,95%,60%)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Flow → Store (checkpoints) -->
  <path d="M600 405L200 365" stroke="hsl(145,90%,60%)" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- OTel trace lines to Observability -->
  <path d="M307 210L300 595" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="2,3"/>
  <path d="M185 380L280 595" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="2,3"/>
  <path d="M380 380L320 595" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="2,3"/>
  <path d="M557 380L520 595" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="2,3"/>
  <path d="M717 380L530 595" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="2,3"/>
  <path d="M167 490L290 595" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="2,3"/>
  <path d="M487 490L500 595" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- ═══════════════════ LEGEND ═══════════════════ -->
  <rect x="840" y="595" width="195" height="100" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)"/>
  <text x="937" y="613" fill="rgba(255,255,255,0.5)" font-size="9" font-family="sans-serif" font-weight="700" text-anchor="middle">LEGEND</text>
  <line x1="855" y1="630" x2="890" y2="630" stroke="hsl(190,100%,65%)" stroke-width="2"/>
  <text x="900" y="633" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif">HTTP data flow</text>
  <line x1="855" y1="648" x2="890" y2="648" stroke="hsl(145,90%,60%)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="900" y="651" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif">Storage / persist</text>
  <line x1="855" y1="666" x2="890" y2="666" stroke="hsl(40,95%,60%)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="900" y="669" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif">Events / scheduling</text>
  <line x1="855" y1="684" x2="890" y2="684" stroke="rgba(245,158,11,0.3)" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="900" y="687" fill="hsl(220,15%,55%)" font-size="8" font-family="sans-serif">OTel traces</text>
</svg>
