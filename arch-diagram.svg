<svg viewBox="0 0 960 580" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background for light-mode visibility -->
  <rect width="960" height="580" rx="16" fill="#0f1119"/>
  <defs>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="grad-gate" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="hsl(190,100%,65%)"/><stop offset="100%" stop-color="hsl(210,100%,55%)"/></linearGradient>
    <linearGradient id="grad-lang" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="hsl(250,100%,75%)"/><stop offset="100%" stop-color="hsl(280,100%,65%)"/></linearGradient>
    <linearGradient id="grad-store" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="hsl(145,90%,60%)"/><stop offset="100%" stop-color="hsl(170,90%,50%)"/></linearGradient>
    <linearGradient id="grad-queue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="hsl(40,95%,60%)"/><stop offset="100%" stop-color="hsl(20,95%,50%)"/></linearGradient>
    <marker id="arr-b" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0 1.5L8 5 0 8.5z" fill="hsl(190,100%,65%)"/></marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0 1.5L8 5 0 8.5z" fill="hsl(145,90%,60%)"/></marker>
    <marker id="arr-o" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0 1.5L8 5 0 8.5z" fill="hsl(40,95%,60%)"/></marker>
  </defs>

  <!-- Layer Labels -->
  <text x="18" y="72" fill="hsl(250,100%,75%)" font-size="10" font-family="sans-serif" font-weight="700" opacity="0.7">DEVELOPER</text>
  <text x="18" y="202" fill="hsl(190,100%,65%)" font-size="10" font-family="sans-serif" font-weight="700" opacity="0.7">PLATFORM</text>
  <text x="18" y="362" fill="hsl(145,90%,60%)" font-size="10" font-family="sans-serif" font-weight="700" opacity="0.7">INFRA</text>
  <text x="18" y="512" fill="hsl(40,95%,60%)" font-size="10" font-family="sans-serif" font-weight="700" opacity="0.7">OBSERVE</text>

  <!-- Layer separators -->
  <line x1="80" y1="120" x2="940" y2="120" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="80" y1="280" x2="940" y2="280" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="80" y1="450" x2="940" y2="450" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- DEVELOPER LAYER -->
  <rect x="100" y="35" width="155" height="70" rx="14" fill="rgba(168,85,247,0.05)" stroke="url(#grad-lang)" stroke-width="1.5" filter="url(#glow-purple)"/>
  <text x="177" y="62" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">Serv-lang</text>
  <text x="177" y="78" fill="hsl(250,100%,75%)" font-size="9" font-family="monospace" text-anchor="middle">Compiler + LSP</text>
  <text x="177" y="93" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif" text-anchor="middle">.srv → native binary</text>

  <rect x="285" y="35" width="145" height="70" rx="14" fill="rgba(168,85,247,0.03)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="357" y="62" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">ServRegistry</text>
  <text x="357" y="78" fill="hsl(250,100%,75%)" font-size="9" font-family="monospace" text-anchor="middle">:8088</text>
  <text x="357" y="93" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif" text-anchor="middle">Package Hub + Versions</text>

  <!-- PLATFORM LAYER -->
  <!-- Client -->
  <rect x="100" y="155" width="90" height="80" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="145" y="190" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">Client</text>
  <text x="145" y="206" fill="hsl(220,15%,50%)" font-size="9" font-family="sans-serif" text-anchor="middle">Browser / SDK</text>
  <text x="145" y="220" fill="hsl(220,15%,50%)" font-size="9" font-family="sans-serif" text-anchor="middle">CLI / Agent</text>

  <!-- ServGate -->
  <rect x="240" y="140" width="160" height="110" rx="16" fill="rgba(6,182,212,0.05)" stroke="url(#grad-gate)" stroke-width="2" filter="url(#glow-blue)"/>
  <text x="320" y="167" fill="#fff" font-size="14" font-family="sans-serif" font-weight="700" text-anchor="middle">ServGate</text>
  <text x="320" y="183" fill="hsl(190,100%,65%)" font-size="9" font-family="monospace" text-anchor="middle">:8080 · API Gateway</text>
  <rect x="257" y="195" width="126" height="18" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="320" y="207" fill="hsl(190,100%,65%)" font-size="8" font-family="monospace" font-weight="500" text-anchor="middle">WASM Middleware</text>
  <rect x="257" y="217" width="126" height="18" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="320" y="229" fill="hsl(190,100%,65%)" font-size="8" font-family="monospace" font-weight="500" text-anchor="middle">AI Guard · Rate Limit</text>

  <!-- ServMesh -->
  <rect x="450" y="155" width="140" height="80" rx="14" fill="rgba(6,182,212,0.03)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="520" y="182" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">ServMesh</text>
  <text x="520" y="198" fill="hsl(190,100%,65%)" font-size="9" font-family="monospace" text-anchor="middle">:8089</text>
  <text x="520" y="218" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif" text-anchor="middle">Discovery · Circuit Breaker</text>

  <!-- ServTunnel -->
  <rect x="640" y="155" width="130" height="80" rx="14" fill="rgba(6,182,212,0.03)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="705" y="182" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">ServTunnel</text>
  <text x="705" y="198" fill="hsl(190,100%,65%)" font-size="9" font-family="monospace" text-anchor="middle">:8443</text>
  <text x="705" y="218" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif" text-anchor="middle">WS Relay · Subdomain</text>

  <!-- ServCloud -->
  <rect x="810" y="155" width="130" height="80" rx="14" fill="rgba(6,182,212,0.03)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="875" y="182" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">ServCloud</text>
  <text x="875" y="198" fill="hsl(190,100%,65%)" font-size="9" font-family="monospace" text-anchor="middle">:8085</text>
  <text x="875" y="218" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif" text-anchor="middle">PaaS · Deploy Orch</text>

  <!-- INFRASTRUCTURE LAYER -->
  <rect x="100" y="310" width="180" height="110" rx="16" fill="rgba(16,185,129,0.05)" stroke="url(#grad-store)" stroke-width="2" filter="url(#glow-green)"/>
  <text x="190" y="340" fill="#fff" font-size="14" font-family="sans-serif" font-weight="700" text-anchor="middle">ServStore</text>
  <text x="190" y="356" fill="hsl(145,90%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8081 · S3 Object Storage</text>
  <rect x="115" y="370" width="150" height="16" rx="4" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.15)"/>
  <text x="190" y="381" fill="hsl(145,90%,60%)" font-size="8" font-family="monospace" text-anchor="middle">Hash Ring · Erasure Code</text>
  <rect x="115" y="390" width="150" height="16" rx="4" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.15)"/>
  <text x="190" y="401" fill="hsl(145,90%,60%)" font-size="8" font-family="monospace" text-anchor="middle">Semantic Search · Raft</text>

  <rect x="320" y="310" width="180" height="110" rx="16" fill="rgba(245,158,11,0.05)" stroke="url(#grad-queue)" stroke-width="2" filter="url(#glow-orange)"/>
  <text x="410" y="340" fill="#fff" font-size="14" font-family="sans-serif" font-weight="700" text-anchor="middle">ServQueue</text>
  <text x="410" y="356" fill="hsl(40,95%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8082 · STOMP Broker</text>
  <rect x="335" y="370" width="150" height="16" rx="4" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.15)"/>
  <text x="410" y="381" fill="hsl(40,95%,60%)" font-size="8" font-family="monospace" text-anchor="middle">WASM Transforms · DLQ</text>
  <rect x="335" y="390" width="150" height="16" rx="4" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.15)"/>
  <text x="410" y="401" fill="hsl(40,95%,60%)" font-size="8" font-family="monospace" text-anchor="middle">Consumer Groups · Dedup</text>

  <rect x="540" y="310" width="150" height="110" rx="14" fill="rgba(16,185,129,0.03)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="615" y="340" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">ServCache</text>
  <text x="615" y="356" fill="hsl(145,90%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8086 · Cache</text>
  <text x="615" y="380" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif" text-anchor="middle">Memory / Redis Backend</text>
  <text x="615" y="395" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif" text-anchor="middle">Active TTL Eviction</text>

  <rect x="730" y="310" width="150" height="110" rx="14" fill="rgba(245,158,11,0.03)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="805" y="340" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">ServCron</text>
  <text x="805" y="356" fill="hsl(40,95%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8087 · Scheduler</text>
  <text x="805" y="380" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif" text-anchor="middle">Redis Leader Election</text>
  <text x="805" y="395" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif" text-anchor="middle">Cron + Interval Jobs</text>

  <!-- OBSERVABILITY LAYER -->
  <rect x="250" y="475" width="200" height="80" rx="16" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.35)" stroke-width="1.5" filter="url(#glow-orange)"/>
  <text x="350" y="505" fill="#fff" font-size="14" font-family="sans-serif" font-weight="700" text-anchor="middle">ServConsole</text>
  <text x="350" y="521" fill="hsl(40,95%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8083 · Dashboard + Mgmt</text>
  <text x="350" y="540" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif" text-anchor="middle">AI Observatory · SQL · Traces</text>

  <rect x="510" y="475" width="160" height="80" rx="14" fill="rgba(245,158,11,0.03)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="590" y="505" fill="#fff" font-size="13" font-family="sans-serif" font-weight="700" text-anchor="middle">ServTrace</text>
  <text x="590" y="521" fill="hsl(40,95%,60%)" font-size="9" font-family="monospace" text-anchor="middle">:8090 · OTLP Collector</text>
  <text x="590" y="540" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif" text-anchor="middle">Span Ingestion + Query</text>

  <!-- DATA FLOW CONNECTIONS -->
  <!-- Client → Gate -->
  <path d="M190 195L240 195" stroke="hsl(190,100%,65%)" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="215" y="188" fill="hsl(190,100%,65%)" font-size="7" font-family="sans-serif" font-weight="600" text-anchor="middle">HTTP</text>

  <!-- Gate → Mesh -->
  <path d="M400 195L450 195" stroke="hsl(190,100%,65%)" stroke-width="1.5" marker-end="url(#arr-b)" stroke-dasharray="4,3"/>

  <!-- Gate → Store -->
  <path d="M300 250L190 310" stroke="hsl(145,90%,60%)" stroke-width="1.5" marker-end="url(#arr-g)" stroke-dasharray="4,3"/>
  <!-- Gate → Queue -->
  <path d="M340 250L410 310" stroke="hsl(40,95%,60%)" stroke-width="1.5" marker-end="url(#arr-o)" stroke-dasharray="4,3"/>

  <!-- Mesh → Cache -->
  <path d="M520 235L615 310" stroke="hsl(145,90%,60%)" stroke-width="1.2" marker-end="url(#arr-g)" stroke-dasharray="4,3"/>
  <!-- Mesh → Cron -->
  <path d="M540 235L805 310" stroke="hsl(40,95%,60%)" stroke-width="1" marker-end="url(#arr-o)" stroke-dasharray="3,3"/>

  <!-- Cloud → Gate (route sync) -->
  <path d="M810 195L400 180" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="605" y="173" fill="rgba(255,255,255,0.35)" font-size="7" font-family="sans-serif" text-anchor="middle">Route Sync</text>

  <!-- OTel trace lines to Observability -->
  <path d="M320 250L350 475" stroke="rgba(245,158,11,0.18)" stroke-width="1" stroke-dasharray="2,3"/>
  <path d="M190 420L350 475" stroke="rgba(245,158,11,0.18)" stroke-width="1" stroke-dasharray="2,3"/>
  <path d="M410 420L380 475" stroke="rgba(245,158,11,0.18)" stroke-width="1" stroke-dasharray="2,3"/>
  <path d="M615 420L590 475" stroke="rgba(245,158,11,0.18)" stroke-width="1" stroke-dasharray="2,3"/>
  <path d="M805 420L610 475" stroke="rgba(245,158,11,0.18)" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Legend -->
  <rect x="730" y="475" width="200" height="80" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>
  <text x="830" y="493" fill="rgba(255,255,255,0.5)" font-size="8" font-family="sans-serif" font-weight="700" text-anchor="middle">LEGEND</text>
  <line x1="745" y1="507" x2="775" y2="507" stroke="hsl(190,100%,65%)" stroke-width="2"/>
  <text x="785" y="510" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif">Data flow (HTTP)</text>
  <line x1="745" y1="523" x2="775" y2="523" stroke="hsl(145,90%,60%)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="785" y="526" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif">Storage ops</text>
  <line x1="745" y1="539" x2="775" y2="539" stroke="hsl(40,95%,60%)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="785" y="542" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif">Events / Scheduling</text>
  <line x1="745" y1="555" x2="775" y2="555" stroke="rgba(245,158,11,0.3)" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="785" y="558" fill="hsl(220,15%,50%)" font-size="8" font-family="sans-serif">OTel traces</text>
</svg>
