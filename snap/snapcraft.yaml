name: servverse
version: '1.7.0'
summary: Unified developer platform ecosystem
description: |
  ServVerse provides a complete microservice developer toolkit: compiler, API Gateway, S3 storage, broker, trace collector and more.
confinement: strict
base: core22

apps:
  compiler:
    command: bin/serv
    plugs: [home, network]
  gateway:
    command: bin/servgate
    plugs: [network, network-bind]
  store:
    command: bin/servstore
    plugs: [network, network-bind]
  queue:
    command: bin/servqueue
    plugs: [network, network-bind]
  console:
    command: bin/servconsole
    plugs: [network, network-bind]

parts:
  binaries:
    plugin: dump
    source: .
    organize:
      serv: bin/serv
      servgate: bin/servgate
      servstore: bin/servstore
      servqueue: bin/servqueue
      servconsole: bin/servconsole
