<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Servverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      letter-spacing: -4px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-message {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .error-hint {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 2.5rem;
      max-width: 400px;
    }
    .error-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="aurora-bg"></div>
  <div class="error-page">
    <div class="error-code">404</div>
    <p class="error-message">Page not found</p>
    <p class="error-hint">The route you requested doesn't exist. Maybe it was moved or the URL has a typo.</p>
    <div class="error-actions">
      <a href="index.html" class="btn btn-primary">Back to Home</a>
      <a href="index.html#blog" class="btn btn-secondary">Read the Blog</a>
    </div>
  </div>
  <script>
    if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light-theme');
  </script>
</body>
</html>
